<!DOCTYPE html>
<html lang="pt-br" class="scroll-smooth">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pets-Top | Agenda VIP</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.34/dist/lenis.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Montserrat:wght@800;900&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        petPurple: '#632CA9',
                        petPurpleDark: '#1A023A',
                        petGreen: '#8EA716',
                        petGreenLight: '#F4F7E9',
                        surface: '#FAFAFA',
                    },
                    fontFamily: {
                        poppins: ['Poppins', 'sans-serif'],
                        montserrat: ['Montserrat', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        ::selection { background: #8EA716; color: #fff; }
        .glass-nav { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.3); }
        
        input[type="date"]::-webkit-calendar-picker-indicator {
            background-color: #F4F7E9; padding: 6px; border-radius: 8px; cursor: pointer; color: #8EA716;
        }
        input:focus { box-shadow: 0 0 0 4px rgba(142, 167, 22, 0.1); }

        .blob-bg {
            position: absolute; width: 600px; height: 600px; background: radial-gradient(circle, rgba(142,167,22,0.08) 0%, rgba(99,44,169,0.03) 100%);
            filter: blur(80px); border-radius: 50%; z-index: 0; pointer-events: none;
        }

        .loader { border: 3px solid rgba(142, 167, 22, 0.2); border-top: 3px solid #8EA716; border-radius: 50%; width: 32px; height: 32px; animation: spin 1s linear infinite; margin: 2rem auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="font-poppins bg-[#FAFBF7] text-gray-800 overflow-x-hidden relative min-h-screen flex flex-col">

    <div class="blob-bg top-[-10%] left-[-10%]"></div>
    <div class="blob-bg bottom-[10%] right-[-10%]"></div>

    <header class="fixed w-full z-[100] glass-nav transition-all duration-300">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <a href="index.html" class="w-24 hover:scale-105 transition-transform duration-500">
                    <img src="/imgs/intro/logo.svg" alt="PetsTop Logo">
                </a>
                <span class="hidden md:inline-block px-3 py-1 rounded-full bg-petPurpleDark text-white text-[9px] font-bold uppercase tracking-widest">Painel Administrativo</span>
            </div>
            
            <div class="flex items-center gap-4">
                <div class="text-right hidden sm:block">
                    <p class="text-[10px] font-bold uppercase tracking-widest text-gray-400">Data Base</p>
                    <p class="text-sm font-bold text-petPurpleDark" id="header-date">Carregando...</p>
                </div>
            </div>
        </div>
    </header>

    <main class="pt-32 pb-32 relative z-10 flex-grow">
        <div class="container mx-auto px-6 max-w-5xl">
            
            <div class="bg-white p-6 sm:p-8 rounded-[2rem] border border-gray-100 shadow-xl shadow-petPurpleDark/5 mb-10 flex flex-col sm:flex-row justify-between items-center gap-6 gs-reveal">
                <div>
                    <h1 class="text-3xl font-montserrat font-black text-petPurpleDark italic">Agenda do Dia</h1>
                    <p class="text-sm text-gray-500 mt-1">Gerencie status, confirmações e cancelamentos.</p>
                </div>
                
                <div class="w-full sm:w-auto flex items-center gap-4 bg-surface p-2 rounded-2xl border border-gray-100">
                    <label for="filtroData" class="pl-4 text-[10px] font-bold uppercase tracking-widest text-gray-400">Filtrar Data:</label>
                    <input type="date" id="filtroData" onchange="buscarAgendaDia()" 
                           class="bg-transparent border-none text-sm font-bold text-petPurpleDark focus:outline-none cursor-pointer">
                </div>
            </div>

            <div id="agenda-container" class="space-y-4 gs-reveal">
                </div>

        </div>
    </main>

    <footer class="bg-white py-6 border-t border-gray-100 mt-auto relative z-10">
        <div class="container mx-auto px-6 text-center">
            <span class="text-[10px] font-black text-petPurpleDark tracking-widest uppercase">Sistema OKTO DESIGN AG</span>
        </div>
    </footer>

    <script>
        // Setup Inicial de Scroll
        const lenis = new Lenis({ duration: 1.2 });
        function raf(time) { lenis.raf(time); requestAnimationFrame(raf); }
        requestAnimationFrame(raf);
        gsap.from('.gs-reveal', { y: 30, opacity: 0, duration: 1, ease: "power3.out", stagger: 0.1 });

        // ==========================================
        // INTEGRAÇÃO COM A API (Backend Spring Boot)
        // ==========================================
        const API_BASE_URL = "https://saaspetsop-production.up.railway.app/agendamentos";

        document.addEventListener("DOMContentLoaded", () => {
            // Seta data atual no input e busca a agenda ao carregar a página
            const hoje = new Date().toISOString().split('T')[0];
            document.getElementById('filtroData').value = hoje;
            buscarAgendaDia();
        });

        // 1) BUSCAR AGENDA DO DIA
        async function buscarAgendaDia() {
            const dataFiltro = document.getElementById('filtroData').value;
            const container = document.getElementById('agenda-container');
            
            // Atualiza data do cabeçalho
            const partes = dataFiltro.split('-');
            document.getElementById('header-date').innerText = `${partes[2]}/${partes[1]}/${partes[0]}`;
            
            // Exibe Loader
            container.innerHTML = '<div class="bg-white p-10 rounded-[2rem] text-center border border-gray-100 shadow-sm"><div class="loader"></div><p class="text-xs font-bold uppercase tracking-widest text-gray-400 mt-4">Buscando agendamentos...</p></div>';

            try {
                // GET /agendamentos/agenda?data=YYYY-MM-DD
                const response = await fetch(`${API_BASE_URL}/agenda?data=${dataFiltro}`);
                if (!response.ok) throw new Error("Erro na resposta da API");
                
                const agendamentos = await response.json();
                renderizarListaAgenda(agendamentos);
                
            } catch (error) {
                console.error("Erro ao buscar agenda:", error);
                container.innerHTML = `
                    <div class="bg-red-50 p-8 rounded-[2rem] text-center border border-red-100">
                        <p class="text-sm font-bold text-red-500">Erro ao conectar com a API no localhost:8080.</p>
                        <button onclick="buscarAgendaDia()" class="mt-4 text-xs font-bold text-red-600 underline">Tentar Novamente</button>
                    </div>`;
            }
        }

        // 2) CONFIRMAR OU CANCELAR AGENDAMENTO
        async function alterarStatusAgendamento(id, acao) {
            try {
                // POST /agendamentos/{id}/confirmar OU /agendamentos/{id}/cancelar
                const response = await fetch(`${API_BASE_URL}/${id}/${acao}`, {
                    method: 'POST'
                });

                if (response.ok) {
                    // Após a confirmação/cancelamento dar certo, atualiza a lista automaticamente
                    buscarAgendaDia();
                } else {
                    alert(`Falha ao tentar ${acao} o agendamento.`);
                }
            } catch (error) {
                console.error(`Erro na requisição de ${acao}:`, error);
                alert("Erro de comunicação com o servidor.");
            }
        }

        // FUNÇÃO DE RENDERIZAÇÃO
        function renderizarListaAgenda(agendamentos) {
            const container = document.getElementById('agenda-container');
            container.innerHTML = '';

            if (agendamentos.length === 0) {
                container.innerHTML = `
                    <div class="bg-white p-12 rounded-[2rem] text-center border border-gray-100 shadow-sm">
                        <div class="w-16 h-16 bg-surface rounded-full flex items-center justify-center mx-auto mb-4">
                            <svg class="w-8 h-8 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                        </div>
                        <p class="text-lg font-bold text-petPurpleDark">Nenhum pet agendado</p>
                        <p class="text-sm text-gray-400 mt-1">A agenda está livre para esta data.</p>
                    </div>`;
                return;
            }

            // Ordena os agendamentos pelo horário para garantir que fiquem cronológicos
            agendamentos.sort((a, b) => new Date(a.horario) - new Date(b.horario));

            agendamentos.forEach(item => {
                // Formatação visual da Hora: "2026-03-07T09:00:00" -> "09:00"
                const horaLimpa = item.horario.substring(11, 16);
                
                // Labels amigáveis para Serviço
                const labelsServico = { "BANHO": "Banho", "TOSA_HIGIENICA": "Banho + Tosa" };
                const textoServico = labelsServico[item.servico] || item.servico;

                // Definindo as cores e textos do Status
                let statusClasses = "";
                let statusDot = "";
                let statusTexto = item.status || "PENDENTE";

                if (statusTexto === "CONFIRMADO") {
                    statusClasses = "bg-petGreen/10 text-petGreen border-petGreen/20";
                    statusDot = "bg-petGreen";
                } else if (statusTexto === "CANCELADO") {
                    statusClasses = "bg-red-50 text-red-500 border-red-100";
                    statusDot = "bg-red-500";
                } else {
                    // PENDENTE
                    statusClasses = "bg-yellow-50 text-yellow-600 border-yellow-200";
                    statusDot = "bg-yellow-500 animate-pulse";
                }

                // Criação do HTML do Card
                const card = document.createElement('div');
                card.className = "bg-white p-6 sm:p-8 rounded-[2rem] border border-gray-100 shadow-sm hover:shadow-xl hover:border-petGreen/20 transition-all flex flex-col lg:flex-row gap-6 items-start lg:items-center";
                
                card.innerHTML = `
                    <div class="bg-surface border border-gray-100 rounded-2xl p-4 text-center min-w-[100px] shrink-0">
                        <span class="block text-[10px] font-bold uppercase tracking-widest text-gray-400">Horário</span>
                        <span class="block text-2xl font-black text-petPurpleDark mt-1">${horaLimpa}</span>
                    </div>

                    <div class="flex-grow">
                        <div class="flex flex-wrap items-center gap-2 mb-3">
                            <div class="flex items-center gap-1.5 px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-widest border ${statusClasses}">
                                <span class="w-2 h-2 rounded-full ${statusDot}"></span>
                                <span>${statusTexto}</span>
                            </div>
                            <span class="px-3 py-1 rounded-full bg-petPurple/5 text-petPurple text-[10px] font-bold uppercase tracking-widest border border-petPurple/10">
                                ${textoServico}
                            </span>
                            <span class="px-3 py-1 rounded-full bg-gray-50 text-gray-500 text-[10px] font-bold uppercase tracking-widest border border-gray-200">
                                Porte ${item.porte}
                            </span>
                        </div>
                        <h3 class="text-xl font-bold text-petPurpleDark mb-1">${item.nomeCliente}</h3>
                        <p class="text-sm text-gray-500 flex items-center gap-1">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg>
                            ${item.telefone}
                        </p>
                    </div>

                    <div class="w-full lg:w-auto shrink-0 flex flex-wrap gap-2 mt-4 lg:mt-0">
                        <button onclick="alterarStatusAgendamento(${item.id}, 'confirmar')" class="flex-1 lg:flex-none flex items-center justify-center gap-2 bg-petGreenLight text-petGreen border border-petGreen/20 px-5 py-3 rounded-xl text-[11px] font-bold uppercase tracking-widest hover:bg-petGreen hover:text-white transition-colors shadow-sm">
                            ✔ Confirmar
                        </button>
                        <button onclick="alterarStatusAgendamento(${item.id}, 'cancelar')" class="flex-1 lg:flex-none flex items-center justify-center gap-2 bg-red-50 text-red-500 border border-red-100 px-5 py-3 rounded-xl text-[11px] font-bold uppercase tracking-widest hover:bg-red-500 hover:text-white transition-colors shadow-sm">
                            ❌ Cancelar
                        </button>
                    </div>
                `;
                
                container.appendChild(card);
            });
        }
    </script>
</body>
</html>
